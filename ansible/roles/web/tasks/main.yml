---
# Web role: installs and configures Nginx as a reverse proxy

- name: Install Nginx
  apt:
    name: nginx
    state: present
  become: yes

- name: Ensure Nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: yes
  become: yes

- name: Deploy Nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: Reload Nginx
  become: yes

handlers:
  - name: Reload Nginx
    service:
      name: nginx
      state: reloaded
    become: yes