---
# Web role: installs and configures Nginx as a reverse proxy

# Install the Nginx package
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
  become: true

# Ensure the Nginx service is running and enabled on boot
- name: Ensure Nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  become: true

# Deploy the Nginx configuration template
- name: Deploy Nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: Reload Nginx
  become: true

### Handlers ###

handlers:
  - name: Reload Nginx
    ansible.builtin.service:
      name: nginx
      state: reloaded
    become: true