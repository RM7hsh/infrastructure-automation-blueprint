version: "3"

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${db_name}
      POSTGRES_USER: ${db_user}
      POSTGRES_PASSWORD: ${db_password}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  web:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - backend

volumes:
  db_data:

networks:
  backend: